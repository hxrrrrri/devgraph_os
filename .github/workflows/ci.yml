name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (lint, typecheck, security, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy devgraph
      - name: Bandit
        run: bandit -q -r devgraph -c pyproject.toml
      - name: Pytest
        run: pytest -q

  node:
    name: Node (typecheck, dashboard, vscode-extension)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        # No version pinned here — pnpm/action-setup honors packageManager in package.json,
        # which is the single source of truth.
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Build dashboard
        run: pnpm --filter @devgraph/dashboard build
      - name: Compile VS Code extension
        run: pnpm --filter @devgraph/vscode-extension compile
      - name: Check dashboard bundle size
        run: |
          set -eu
          largest=$(find apps/dashboard/dist/assets -name '*.js' -printf '%s\n' | sort -nr | head -1)
          echo "Largest dashboard chunk: ${largest} bytes"
          # 700 kB hard cap on the largest single chunk after manualChunks split.
          if [ "${largest}" -gt 716800 ]; then
            echo "Dashboard bundle regressed: largest chunk ${largest} > 716800 bytes" >&2
            exit 1
          fi
      - name: Upload dashboard build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: apps/dashboard/dist
          retention-days: 7
      - name: Upload VS Code extension build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-out
          path: apps/vscode-extension/out
          retention-days: 7
