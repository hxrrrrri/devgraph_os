name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (lint, typecheck, security, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy devgraph
      - name: Bandit
        run: bandit -q -r devgraph -c pyproject.toml
      - name: Pytest
        run: pytest -q
      - name: Coverage report (informational; threshold pending 3 stable runs)
        run: |
          set -eu
          pip install coverage
          coverage run -m pytest -q || true
          coverage report || true

  node:
    name: Node (typecheck, dashboard, vscode-extension)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        # No version pinned here — pnpm/action-setup honors packageManager in package.json,
        # which is the single source of truth.
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Build dashboard
        run: pnpm --filter @devgraph/dashboard build
      - name: Compile VS Code extension
        run: pnpm --filter @devgraph/vscode-extension compile
      - name: Check dashboard bundle size
        run: |
          set -eu
          largest=$(find apps/dashboard/dist/assets -name '*.js' -printf '%s\n' | sort -nr | head -1)
          echo "Largest dashboard chunk: ${largest} bytes"
          # 1.1 MB hard cap on the largest single chunk after manualChunks split.
          # Raised in v1.3 to absorb the graph-explorer rewrite (Zustand store,
          # dagre + elkjs layout, layer adapter). Re-tighten once code-splitting
          # of the secondary lenses lands.
          if [ "${largest}" -gt 1153433 ]; then
            echo "Dashboard bundle regressed: largest chunk ${largest} > 1153433 bytes" >&2
            exit 1
          fi
      - name: Smoke-test dashboard preview server
        run: |
          set -eu
          pnpm --filter @devgraph/dashboard exec vite preview --port 4173 --strictPort &
          preview_pid=$!
          trap "kill $preview_pid >/dev/null 2>&1 || true" EXIT
          # Wait for the preview server to bind. 30 retries x 1s = ~30s max.
          for attempt in $(seq 1 30); do
            if curl -fsS -o /dev/null http://127.0.0.1:4173/; then
              echo "vite preview is serving."
              exit 0
            fi
            sleep 1
          done
          echo "vite preview did not respond on http://127.0.0.1:4173/" >&2
          exit 1
      - name: Upload dashboard build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: apps/dashboard/dist
          retention-days: 7
      - name: Upload VS Code extension build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-out
          path: apps/vscode-extension/out
          retention-days: 7
